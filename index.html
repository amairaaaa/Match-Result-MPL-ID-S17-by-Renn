                            <th class="p-4"><div class="mini-label text-yellow-500">NET GAME</div>Win</th>

    <script>
        let currentWeek = 1;
        function render() {
            const availableWeeks = [...new Set(matchData.map(m => m.week))].sort((a,b) => a-b);
            document.getElementById('week-tabs').innerHTML = availableWeeks.map(w => `
                <button onclick="currentWeek=${w}; render()" class="flex-shrink-0 px-4 py-1 text-[10px] font-bold border ${currentWeek == w ? 'tab-active border-yellow-500' : 'border-slate-800 text-slate-500'} uppercase">W${w}</button>
            `).join('');

            const scheduleContainer = document.getElementById('schedule-container');
            const filteredData = matchData.filter(m => m.week === currentWeek);
            let lastDate = "";
            
            if(filteredData.length === 0) {
                scheduleContainer.innerHTML = `<div class="text-center p-10 text-slate-700 italic border border-dashed border-slate-800">Belum ada jadwal.</div>`;
            } else {
                scheduleContainer.innerHTML = filteredData.map(m => {
                    let dateHeader = m.date !== lastDate ? `<div class="text-[10px] font-bold text-slate-700 tracking-[0.3em] uppercase mt-6 mb-2">${m.date}</div>` : "";
                    lastDate = m.date;
                    const isFinal = m.s1 !== null && m.s2 !== null;
                    return `
                        ${dateHeader}
                        <div class="match-card p-5 flex items-center justify-between">
                            <div class="flex-1 text-right font-black italic uppercase text-lg ${isFinal && m.s1 > m.s2 ? 'text-yellow-500' : 'text-white'}">${m.t1}</div>
                            <div class="px-6 flex flex-col items-center min-w-[120px]">
                                ${isFinal ? `<div class="text-3xl font-black italic">${m.s1}-${m.s2}</div>` : `<div class="text-[10px] text-slate-500 font-bold mb-1">${m.time}</div><span class="text-lg font-black text-slate-800 italic">VS</span>`}
                            </div>
                            <div class="flex-1 text-left font-black italic uppercase text-lg ${isFinal && m.s2 > m.s1 ? 'text-yellow-500' : 'text-white'}">${m.t2}</div>
                        </div>`;
                }).join('');
            }

            let stats = teams.reduce((acc, t) => { acc[t] = { name: t, mW: 0, mL: 0, mPts: 0, gW: 0, gL: 0, netG: 0 }; return acc; }, {});
            matchData.forEach(m => {
                if (m.s1 !== null && m.s2 !== null) {
                    stats[m.t1].gW += m.s1; stats[m.t1].gL += m.s2; stats[m.t2].gW += m.s2; stats[m.t2].gL += m.s1;
                    stats[m.t1].netG += (m.s1 - m.s2); stats[m.t2].netG += (m.s2 - m.s1);
                    if (m.s1 > m.s2) { stats[m.t1].mW++; stats[m.t1].mPts++; stats[m.t2].mL++; } 
                    else if (m.s2 > m.s1) { stats[m.t2].mW++; stats[m.t2].mPts++; stats[m.t1].mL++; }
                }
            });

            const sorted = Object.values(stats).sort((a, b) => b.mPts - a.mPts || b.netG - a.netG);
            document.getElementById('standings-body').innerHTML = sorted.map((t, i) => `
                <tr class="border-b border-slate-900/50 ${i < 6 ? 'text-white font-bold' : 'text-slate-500'}">
                    <td class="p-4 font-black italic ${i==0?'text-yellow-500 text-lg':''}">${i + 1}</td>
                    <td class="p-4 font-black italic uppercase text-left text-sm tracking-tighter">${t.name}</td>
                    <td class="p-4 text-center text-xs font-mono bg-slate-900/10 border-r border-slate-800/50">${t.mW}-${t.mL}</td>
                    <td class="p-4 text-center highlight-pts bg-slate-900/10 border-r border-slate-800/50">${t.mPts}</td>
                    <td class="p-4 text-center text-xs font-mono border-r border-slate-800/50">${t.gW}-${t.gL}</td>
                    <td class="p-4 text-center font-black ${t.netG > 0 ? 'plus' : (t.netG < 0 ? 'minus' : '')}">${t.netG}</td>
                </tr>`).join('');
        }
        document.addEventListener('DOMContentLoaded', render);
